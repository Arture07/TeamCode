services:
  postgres-db:
    image: postgres:14-alpine
    container_name: teamcode-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - teamcode-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamcode_user -d teamcode_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build: ./user-service
    container_name: teamcode-user-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - TZ=America/Sao_Paulo
    expose:
      - "8080"
    networks:
      - teamcode-net
    restart: unless-stopped
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:8080/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  session-service:
    build: ./session-service
    container_name: teamcode-session-service
    expose:
      - "8080"
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3-flash-preview}
      - TZ=America/Sao_Paulo
    networks:
      - teamcode-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:8080/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  sync-service:
    build: ./sync-service
    container_name: teamcode-sync-service
    networks:
      - teamcode-net
    volumes:
      - session-data:/tmp
    environment:
      - TZ=America/Sao_Paulo
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:8082/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: teamcode-frontend
    ports:
      - "80:80"
    depends_on:
      user-service:
        condition: service_healthy
      session-service:
        condition: service_healthy
      sync-service:
        condition: service_healthy
    volumes:
      - session-data:/usr/share/nginx/html/preview
    networks:
      - teamcode-net
    restart: unless-stopped

networks:
  teamcode-net:
    driver: bridge

volumes:
  postgres-data:
  session-data:
